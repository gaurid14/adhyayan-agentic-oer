<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Denied</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .box {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #dc2626;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #0f766e;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>403 – Access Denied</h1>
        <p>You are not allowed to access this page.</p>
        <a href="/dashboard/student/">Go to Student Dashboard</a>
    </div>
</body>
</html>
